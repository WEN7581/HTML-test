<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浏览器网页测试</title>
<style>
    body {
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #800080 25%, #764ba2 50%);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #444444;
    }
    .container {
        background: rgba(255, 100, 100, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(1, 1, 1, 0.3);
        text-align: center;
        max-width: 600px;
        width: 90%;
        backdrop-filter: blur(10px);
    }
    h1 {
        color: #800080;
        margin-bottom: 20px;
        font-weight: 300;
        font-size: 2.5em;
    }
    .description {
        color: #666666;
        line-height: 1.6;
        margin-bottom: 30px;
        font-size: 1.1em;
    }
    .info-box {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        border-radius: 15px;
        padding: 20px;
        margin: 20px 0;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    .info-title {
        color: #800080;
        font-weight: 600;
        margin-bottom: 10px;
        font-size: 1.2em;
    }
    .info-content {
        color: #555555;
        font-size: 1em;
    }
    .features {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
    }
    .feature {
        background: white;
        border-radius: 10px;
        padding: 20px;
        width: 150px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s, box-shadow 0.3s;
        cursor: pointer; 
    }
    .feature:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    .feature-icon {
        font-size: 2.5em;
        margin-bottom: 10px;
        color: #800080;
    }
    .feature-title {
        font-weight: 600;
        color: #444444;
        margin-bottom: 5px;
    }
    .feature-desc {
        color: #666666;
        font-size: 0.9em;
    }
    .text-link {
        color: #00FF00;
        text-decoration: none;
        transition: color 0.2s;
    }
    .text-link:hover {
        color: #00FF00;
        text-decoration: none;
    }
    .footer {
        margin-top: 30px;
        color: #bbbbbb;
        font-size: 0.9em;
    }
    a {
        color: blue;
        transition: color 0.2s;
    }
    a:hover {
        color: red;
    }
    @media (max-width: 600px) {
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 2em;
        }
        .features {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>
<body>
<div class="container"><h1><a href="https://www.ekwing.com" class="text-link">浏览器网页测试</a></h1></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('页面加载完成');
    const features = document.querySelectorAll('.feature');
    features.forEach(feature => {
        feature.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') {
                return; 
            }
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = '';
            }, 200);
        });
    });
});
</script>
</body>
</html>
